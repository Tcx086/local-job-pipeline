campaign:
  daily_targets:
    deep_tailor: 5
    standard_tailor: 12
    quick_apply: 25
    hold: 0

  estimated_minutes:
    deep_tailor: 25
    standard_tailor: 10
    quick_apply: 4
    hold: 0
    skip: 0

  score_thresholds:
    deep_tailor: 70
    standard_tailor: 55
    quick_apply: 35
    hold: 25

  company_priority:
    tier_1:
      - RBC
      - TD
      - BMO
      - CIBC
      - Scotiabank
      - Capital One
      - Wealthsimple
      - TMX Group
      - HKEX
      - DBS
      - OCBC
      - UOB
      - JPMorgan
      - Goldman Sachs
      - BlackRock
      - Morgan Stanley
      - Citi
      - HSBC
      - Standard Chartered
    crypto_fintech_priority:
      - OKX
      - Binance
      - Coinbase
      - Crypto.com
      - HashKey
      - OSL
      - GSR
      - Wintermute
      - Chainalysis
      - Fireblocks
      - Stripe
      - Wise
      - Revolut

  max_per_company_per_day: 3
  max_same_title_per_day: 5
  exclude_if_already_applied: true
  exclude_if_status:
    - applied
    - interview
    - rejected
    - skipped
    - archived

  auto_generate_resume:
    deep_tailor: false
    standard_tailor: false
    quick_apply: false
    hold: false
    skip: false

  allow_manual_generate_resume:
    deep_tailor: true
    standard_tailor: true
    quick_apply: false
    hold: false
    skip: false

  auto_generate_answer_pack:
    deep_tailor: false
    standard_tailor: false
    quick_apply: false
    hold: false
    skip: false

  allow_manual_generate_answer_pack:
    deep_tailor: true
    standard_tailor: true
    quick_apply: false
    hold: false
    skip: false

  auto_generate_cover_letter:
    deep_tailor: false
    standard_tailor: false
    quick_apply: false
    hold: false
    skip: false

  allow_manual_generate_cover_letter:
    deep_tailor: true
    standard_tailor: true
    quick_apply: false
    hold: false
    skip: false

  quick_apply_requires_existing_profile_resume: true


templates_v2:
  quality_assurance:
    enabled_for:
      role_family:
        - quality_assurance
      title_contains:
        - quality assurance
        - quality analyst
        - qa analyst
        - quality control
    blocked_phrases:
      - practical finance
      - investment
      - trading
      - aerospace quality certification
      - six sigma certification
      - iso audit ownership
    body:
      opening: "I am applying for the {title} role at {company} because the position appears to require careful documentation, process follow-through, data accuracy, and consistent communication across operational workflows. These are areas where my background in structured tracking, reporting, and data quality work is most relevant."
      evidence_single: "In my previous project and work experience, I {evidence_1}."
      evidence_double: "In my previous project and work experience, I {evidence_1}. I have also {evidence_2}."
      learning: "I understand that {company}'s quality assurance environment has its own role-specific standards and systems, and I would approach that learning curve carefully."
      closing: "I would bring a detail-oriented, reliable, and documentation-focused working style to the team."

  data_market_data:

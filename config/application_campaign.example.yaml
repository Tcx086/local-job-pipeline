campaign:
  daily_targets:
    deep_tailor: 2
    standard_tailor: 5
    quick_apply: 10
    hold: 0

  estimated_minutes:
    deep_tailor: 25
    standard_tailor: 12
    quick_apply: 5
    hold: 0
    skip: 0

  score_thresholds:
    deep_tailor: 70
    standard_tailor: 55
    quick_apply: 35
    hold: 25

  company_priority:
    preferred_companies:
      - Example Analytics Co
      - Example Operations Inc

  max_per_company_per_day: 3
  max_same_title_per_day: 5
  exclude_if_already_applied: true
  exclude_if_status:
    - applied
    - interview
    - rejected
    - skipped
    - archived

  auto_generate_resume:
    deep_tailor: false
    standard_tailor: false
    quick_apply: false
    hold: false
    skip: false

  allow_manual_generate_resume:
    deep_tailor: true
    standard_tailor: true
    quick_apply: false
    hold: false
    skip: false

  auto_generate_answer_pack:
    deep_tailor: false
    standard_tailor: false
    quick_apply: false
    hold: false
    skip: false

  allow_manual_generate_answer_pack:
    deep_tailor: true
    standard_tailor: true
    quick_apply: false
    hold: false
    skip: false

  quick_apply_requires_existing_profile_resume: true

resume_profiles:
  general_data:
    keywords:
      - data analyst
      - reporting
      - sql
      - spreadsheet
  business_operations:
    keywords:
      - business operations
      - process improvement
      - stakeholder coordination
  sales_operations:
    keywords:
      - sales operations
      - revenue operations
      - CRM
  technical_support:
    keywords:
      - technical support
      - API
      - troubleshooting
  finance_operations:
    keywords:
      - finance operations
      - reconciliation
      - risk reporting
  operations:
    keywords:
      - operations
      - workflow
      - coordination

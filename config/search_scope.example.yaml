search:
  hours_old: 72
  results_wanted: 10
  sleep_seconds: 8
  mode: normal
  sites:
    - linkedin
    - indeed
    - google

countries:
  Canada:
    enabled: true
    locations:
      - Toronto, ON
      - Remote, Canada
    search_terms:
      - Data Analyst
      - Revenue Operations Analyst
      - Business Operations Analyst
      - Trading Operations Analyst

  United States:
    enabled: false
    locations:
      - Remote, United States
    search_terms:
      - Data Analyst

filters:
  remote_allowed: true
  hybrid_allowed: true
  onsite_allowed: false
  min_score: 35
  exclude_keywords:
    - commission only
    - unpaid
    - senior manager
  include_keywords:
    - SQL
    - Excel
    - operations
    - reporting

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu full
            os: ubuntu-latest
            test_command: python -B -m pytest
            install_libreoffice: true
          - name: Windows core
            os: windows-latest
            test_command: python -B -m pytest -k "not test_profile_export_uses_docx_template_renderer"
            install_libreoffice: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        if: matrix.install_libreoffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: ${{ matrix.test_command }}

      - name: Verify setup wizard
        run: python -B -m job_pipeline.setup_wizard --dry-run

      - name: Verify sample scheduler
        run: python -B -m job_pipeline.scheduler --run-once --sample

      - name: Verify campaign dry run
        run: python -B -m job_pipeline.campaign --today --dry-run
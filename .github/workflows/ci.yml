name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -B -m pytest

      - name: Verify setup wizard
        run: python -B -m job_pipeline.setup_wizard --dry-run

      - name: Verify sample scheduler
        run: python -B -m job_pipeline.scheduler --run-once --sample

      - name: Verify campaign dry run
        run: python -B -m job_pipeline.campaign --today --dry-run
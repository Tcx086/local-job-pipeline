      - "documentation"
      - "data quality"
      - "process tracking"
      - "reporting"
      - "communication"
    avoid_overclaim:
      - "aerospace quality certification"
      - "Six Sigma certification"
      - "ISO audit ownership"
      - "manufacturing QA ownership"

  client_finance:

      - "financial analysis"
      - "data cleaning or reconciliation"
      - "client-facing communication"
    safe_skill_groups:
      - "Excel"
      - "reporting"
      - "budget tracking"
      - "variance analysis"
      - "data analysis"
      - "communication"
    avoid_overclaim:
      - "revenue recognition ownership"
      - "full-cycle accounting ownership"
      - "CPA-level accounting expertise"

  revenue_operations:
    positioning: "revenue operations, reporting, process improvement, and cross-functional business analysis"
    jd_focus_fallback: "sales/revenue reporting, workflow improvement, and operational data quality"
    preferred_evidence:
      - "dashboard/reporting workflow"
      - "data analysis"
      - "business process tracking"
      - "client or stakeholder communication"
    safe_skill_groups:
      - "Excel"
      - "SQL"
      - "Python"
      - "CRM/reporting"
      - "workflow automation"
      - "business analysis"
    avoid_overclaim:
      - "owning revenue strategy"
      - "quota-carrying sales leadership"
      - "enterprise RevOps administration ownership"

fallback:
  positioning: "finance, data analysis, operations, and structured problem-solving"
  jd_focus_fallback: "data-driven decision-making, reporting, and operational execution"
  evidence_sentence_if_sparse: "worked on structured analytical projects that required data cleaning, logic checks, and clear presentation of results"
  skill_sentence_if_sparse: "Excel, Python, SQL, reporting, and communication"
